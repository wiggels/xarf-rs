name: Benchmarks

# Runs `cargo bench` on every PR and on every push to `main`, parses the
# criterion output via github-action-benchmark, and:
#
# * On `main` pushes: appends the result to the historical record stored on
#   the `gh-pages` branch (`/dev/bench/`). Use the GitHub Pages site of this
#   repo to see plots over time.
#
# * On PRs: leaves a comment with the relative change vs the previous `main`
#   result. If any benchmark regressed by more than the configured threshold
#   (default 110% = 10% slower), the workflow fails — making the PR check
#   red so the regression can't merge silently.
#
# ## Set-up checklist (one-time)
#
# 1. After enabling Pages in repo settings, the first `push` run of this
#    workflow self-bootstraps the `gh-pages` branch (see the
#    "Bootstrap gh-pages branch" step below). The action itself does NOT
#    create the branch on first run — without bootstrapping you'd see
#    `could not find remote ref gh-pages` and the workflow would fail.
# 2. Enable GitHub Pages on this repo (Settings → Pages → source `gh-pages`).
#    You can do this either before or after the first run; the workflow
#    creates the branch either way.
# 3. Make sure the workflow has write access to push to `gh-pages`. This is
#    on by default for the default GITHUB_TOKEN as long as repo settings
#    allow it (Settings → Actions → General → Workflow permissions → Read
#    and write permissions).
# 4. Disable this workflow on forks if you don't want forks to run it. The
#    pull_request trigger only runs the alert step, not the storage step, so
#    forks fail-safely without write access.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  deployments: write

# Cancel earlier runs on the same ref — we only care about the latest.
concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    name: Run criterion benches + regression check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # github-action-benchmark refuses to push history if `gh-pages` doesn't
      # already exist — the error is "could not find remote ref gh-pages".
      # Bootstrap an empty orphan branch on the very first run so the action
      # has somewhere to push. Subsequent runs no-op because the branch is
      # already there. Skip this on PRs since they don't push to gh-pages.
      - name: Bootstrap gh-pages branch (first run only)
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages already exists — nothing to bootstrap."
            exit 0
          fi
          echo "gh-pages not found — creating empty orphan branch."
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Switch to an orphan branch in a fresh worktree so we don't disturb
          # the current checkout (the benchmark step needs the source tree).
          tmpdir="$(mktemp -d)"
          git worktree add --detach "$tmpdir"
          (
            cd "$tmpdir"
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
            cat > index.html <<'EOF'
          <!doctype html>
          <meta charset="utf-8">
          <title>xarf-rs benchmarks</title>
          <p>Benchmark history is published under
          <a href="./dev/bench/">/dev/bench/</a>.</p>
          EOF
            git add index.html
            git commit -m "ci: bootstrap gh-pages for benchmark history"
            git push origin gh-pages
          )
          git worktree remove --force "$tmpdir"

      - name: Run benchmarks
        # `--output-format bencher` makes criterion emit `test ... bench:` lines
        # that github-action-benchmark understands directly.
        run: cargo bench --bench xarf -- --output-format bencher | tee output.txt

      - name: Store result and alert on regression
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: cargo
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # On PRs we don't push to gh-pages, just alert.
          # On main we push history.
          auto-push: ${{ github.event_name == 'push' }}
          # 125 = fail if any benchmark is more than 25% slower than baseline.
          # ubuntu-latest shared runners commonly drift ±20% between runs due
          # to noisy neighbors and heterogeneous hardware. Lower this on
          # dedicated/self-hosted runners for tighter regression detection.
          alert-threshold: '125%'
          comment-on-alert: true
          fail-on-alert: true
          # Annotate the PR commit so the regression is visible in the
          # Checks tab even if the bot can't post a comment (e.g. fork PRs).
          alert-comment-cc-users: '@${{ github.actor }}'
          summary-always: true
