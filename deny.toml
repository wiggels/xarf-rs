# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/.
#
# The four sections mirror `cargo deny check {advisories,licenses,bans,sources}`.

[graph]
# Check all targets the crate could plausibly build for. Wildcards are fine.
all-features = true

[advisories]
version = 2
# Fail on any advisory by default; add explicit `ignore` entries with
# justification if a vulnerable dep is unavoidable.
yanked = "deny"
ignore = []

[licenses]
version = 2
# The allowlist is kept tight — only licenses that are actually pulled in by
# the current dep tree. cargo-deny emits "unmatched license allowance"
# warnings for entries here that no dep uses, so adding speculatively just
# generates noise. When a new license appears (audit job will fail with
# "license is not explicitly allowed"), evaluate it for compatibility with
# the MIT license this crate ships under, then add it here with a comment.
allow = [
    "MIT",
    "MIT-0",           # MIT No Attribution — strictly more permissive than MIT
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
# Duplicate versions are routine when several transitive deps target
# different minor releases of low-level crates (`hashbrown`, `getrandom`,
# `wit-bindgen`, etc.). Pinning sub-deps to force convergence is brittle and
# rarely worth the maintenance cost — accept them. The audit job still
# catches real concerns: yanked crates, advisories, and license drift.
multiple-versions = "allow"
wildcards = "deny"
allow-wildcard-paths = false

[sources]
# Only allow deps from crates.io by default.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
